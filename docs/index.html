<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CH4 대안 과제 — 쿼터뷰 밀리 액션</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', 'Inter', -apple-system, 'Segoe UI', sans-serif;
    background: #fafafa;
    color: #1a1a1a;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    padding: 48px 40px 32px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .header h1 {
    font-size: 2.2rem;
    font-weight: 800;
    color: #111;
    letter-spacing: -1.2px;
    margin-bottom: 8px;
  }
  .header .sub {
    font-size: 1.05rem;
    color: #888;
    font-weight: 400;
    line-height: 1.6;
  }

  .summary {
    max-width: 1200px;
    margin: 0 auto 36px;
    padding: 0 40px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  @media (max-width: 700px) {
    .summary { grid-template-columns: repeat(2, 1fr); }
    .header h1 { font-size: 1.6rem; }
    .header, .summary, .legend, .tree, .footer { padding-left: 20px; padding-right: 20px; }
  }
  .card {
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 14px;
    padding: 22px 24px;
    transition: box-shadow 0.2s;
  }
  .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .card .num {
    font-size: 2.6rem;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }
  .card .num.c-blue { color: #2563eb; }
  .card .num.c-amber { color: #d97706; }
  .card .num.c-slate { color: #334155; }
  .card .num.c-green { color: #059669; }
  .card .label {
    font-size: 0.9rem;
    color: #999;
    font-weight: 500;
  }

  .legend {
    max-width: 1200px;
    margin: 0 auto 28px;
    padding: 0 40px;
    display: flex;
    gap: 32px;
    font-size: 0.95rem;
    color: #666;
    font-weight: 500;
  }
  .legend-item { display: flex; align-items: center; gap: 10px; }
  .dot { width: 16px; height: 16px; border-radius: 5px; }
  .dot.req { background: #2563eb; }
  .dot.cha { background: #d97706; }
  .dot.des { background: #059669; }

  .tree {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px 60px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .cat-section {
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 16px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .cat-section:hover { box-shadow: 0 2px 16px rgba(0,0,0,0.05); }

  .cat-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 22px 28px;
    border-bottom: 1px solid #f0f0f0;
  }
  .cat-icon {
    width: 48px;
    height: 48px;
    border-radius: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
  }
  .cat-name {
    font-size: 1.25rem;
    font-weight: 700;
    color: #111;
  }
  .cat-count {
    margin-left: auto;
    font-size: 0.88rem;
    color: #aaa;
    font-weight: 500;
  }

  .cat-body {
    padding: 22px 28px 26px;
  }

  .flow-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 14px;
  }
  .flow-row:last-child { margin-bottom: 0; }

  .node {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 18px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: default;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .node:hover { transform: translateY(-1px); }

  .node.req {
    background: #eff6ff;
    border: 1.5px solid #bfdbfe;
    color: #1d4ed8;
  }
  .node.req:hover {
    background: #dbeafe;
    border-color: #93c5fd;
    box-shadow: 0 3px 12px rgba(37,99,235,0.12);
  }

  .node.cha {
    background: #fffbeb;
    border: 1.5px solid #fde68a;
    color: #b45309;
  }
  .node.cha:hover {
    background: #fef3c7;
    border-color: #fcd34d;
    box-shadow: 0 3px 12px rgba(217,119,6,0.12);
  }

  .node .pts {
    font-size: 0.75rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 6px;
    background: rgba(0,0,0,0.06);
  }
  .node .diff-stars {
    font-size: 0.75rem;
    color: #d97706;
    letter-spacing: -1px;
  }

  .node.design-badge::after {
    content: '설계';
    position: absolute;
    top: -8px;
    right: -8px;
    background: #059669;
    color: #fff;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 6px;
    letter-spacing: 0.3px;
  }

  .arrow-connector {
    color: #ccc;
    font-size: 1.3rem;
    font-weight: 300;
    user-select: none;
  }

  .tooltip {
    display: none;
    position: fixed;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 14px;
    padding: 18px 22px;
    max-width: 400px;
    z-index: 999;
    box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    pointer-events: none;
  }
  .tooltip.show { display: block; }
  .tooltip .t-name {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .tooltip .t-name.req { color: #1d4ed8; }
  .tooltip .t-name.cha { color: #b45309; }
  .tooltip .t-desc {
    font-size: 0.92rem;
    color: #555;
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .tooltip .t-tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .tooltip .tag {
    font-size: 0.78rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 6px;
  }
  .tag.t-pts { background: #eff6ff; color: #2563eb; }
  .tag.t-diff { background: #fffbeb; color: #b45309; }
  .tag.t-des { background: #ecfdf5; color: #059669; }

  .footer {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px 48px;
    text-align: center;
  }
  .footer p {
    font-size: 0.95rem;
    color: #999;
    line-height: 1.7;
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 12px;
    padding: 22px 28px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>CH4 대안 과제 — 쿼터뷰 밀리 액션</h1>
  <div class="sub">CH4 멀티플레이 미참여 학생 대상 · 5~6인 팀 · 3~4주 (작업일 20일)</div>
</div>

<div class="summary">
  <div class="card"><div class="num c-blue">12</div><div class="label">필수 기능</div></div>
  <div class="card"><div class="num c-amber">19</div><div class="label">도전 기능</div></div>
  <div class="card"><div class="num c-slate">26</div><div class="label">필수 최대 점수</div></div>
  <div class="card"><div class="num c-green">9</div><div class="label">설계 채점 항목</div></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="dot req"></div> 필수 — CH3 커리큘럼 기반</div>
  <div class="legend-item"><div class="dot cha"></div> 도전 — 선택적 확장</div>
  <div class="legend-item"><div class="dot des"></div> 설계 채점 적용</div>
</div>

<div class="tree" id="tree"></div>

<div class="footer">
  <p>도전 기능 수가 많은 건 게임 확장에 쓸 수 있는 여러 선택지를 일부러 깔아둔 것입니다.<br>전부 할 필요 없습니다. 하고 싶은 것만 골라서 도전하세요.</p>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
const categories = [
  {
    name: '캐릭터', icon: '🏃', color: '#6366f1', bg: '#eef2ff',
    flows: [
      [
        { n: '쿼터뷰 이동', t: 'req', p: 2, d: 'SpringArm 각도로 쿼터뷰 카메라, Enhanced Input으로 WASD / 점프 / 달리기' },
      ]
    ]
  },
  {
    name: '애니메이션', icon: '🎭', color: '#8b5cf6', bg: '#f5f3ff',
    flows: [
      [
        { n: '상태 전환', t: 'req', p: 2, d: 'Idle / Walk / Run / Jump / Attack / Die — AnimBP 스테이트 머신' },
        { n: '루트 모션 + 모션 워핑', t: 'cha', p: 3, s: '★★★★', d: '루트 모션 기반 이동 + 모션 워핑으로 타겟 보정' },
      ]
    ]
  },
  {
    name: '전투', icon: '⚔️', color: '#dc2626', bg: '#fef2f2',
    flows: [
      [
        { n: '밀리 공격', t: 'req', p: 3, des: true, d: '바라보는 방향으로 공격 (공격 중 방향 입력 시 캐릭터 회전), Overlap / Sweep 판정' },
        { n: '애님몽타주', t: 'cha', p: 2, s: '★★', d: '몽타주 기반 공격 — 필수 밀리 공격의 업그레이드' },
        { n: '애님노티파이', t: 'cha', p: 1, s: '★★', d: '히트 타이밍 노티파이, 이펙트 & 사운드 트리거' },
        { n: '콤보 공격', t: 'cha', p: 3, s: '★★★', des: true, d: '연속 입력으로 2~3타 콤보 체인' },
      ],
      [
        { n: '체력 / 데미지', t: 'req', p: 1, d: '플레이어 & 몬스터 HP, 피격 / 회복 처리' },
        { n: '피격 경직 & 넉백', t: 'cha', p: 1, s: '★★', d: '경직 + 방향성 넉백 처리' },
        { n: '피격 리액션', t: 'cha', p: 2, s: '★★★', d: '피격 애니메이션, 액션 캔슬, 무적 프레임' },
        { n: '슈퍼아머', t: 'cha', p: 1, s: '★★★', d: '특정 액션 중 피격 경직 무시' },
      ],
      [
        { n: '자동 조준 보정', t: 'cha', p: 2, s: '★★★', d: '밀리 범위 내 가장 가까운 적 자동 타겟팅' },
        { n: '투사체', t: 'cha', p: 2, s: '★★★', d: 'ProjectileMovementComponent로 원거리 스킬 / 투사체' },
      ],
    ]
  },
  {
    name: 'AI', icon: '🧠', color: '#0891b2', bg: '#ecfeff',
    flows: [
      [
        { n: '적 AI', t: 'req', p: 5, des: true, d: 'FSM 또는 비헤이비어 트리 기반 추적 & 공격' },
        { n: 'AI 패턴 확장', t: 'cha', p: 1, s: '★★', d: '추적 외 1개 이상 패턴 추가 (순찰, 도주, 원거리 등)' },
      ],
      [
        { n: '몬스터 2종 이상', t: 'req', p: 2, d: '서로 다른 행동 패턴의 몬스터 최소 2종' },
        { n: '보스 몬스터', t: 'cha', p: 5, s: '★★★★', des: true, d: '멀티 패턴 + 페이즈 기반 보스 설계' },
      ],
    ]
  },
  {
    name: '시스템', icon: '⚙️', color: '#0d9488', bg: '#f0fdfa',
    flows: [
      [
        { n: '아이템 시스템', t: 'req', p: 3, des: true, d: 'BaseItem 부모 클래스 상속, 충돌 기반 획득 (회복 등)' },
        { n: '버프 시스템', t: 'cha', p: 4, s: '★★★★', des: true, d: '아이템에서 시간 기반 버프 (공격속도, 이동속도, 공격력 등)' },
      ],
      [
        { n: '몬스터 배치', t: 'req', p: 1, d: '맵 배치 또는 동적 스폰 (방식 자유)' },
        { n: '리젠 구역', t: 'cha', p: 3, s: '★★★', des: true, d: 'N마리 스폰 → 처치 → 쿨타임 리젠, BP 컴포넌트 교체' },
      ],
      [
        { n: '점수 / 게임 루프', t: 'req', p: 3, des: true, d: 'GameState 시작 → 플레이 → 클리어 / 게임오버, 레벨 전환' },
      ],
      [
        { n: '트리거 시스템', t: 'cha', p: 3, s: '★★★', des: true, d: '확장 가능한 부모 클래스 (문, 보물상자, 스위치, 포탈)' },
        { n: 'NPC 말풍선', t: 'cha', p: 1, s: '★★', d: '근접 시 트리거 기반 말풍선 UI' },
      ],
      [
        { n: '서브시스템 활용', t: 'cha', p: 3, s: '★★★', des: true, d: 'UE Subsystem으로 매니저 클래스 구현 (몬스터 관리, 아이템 관리 등)' },
      ],
    ]
  },
  {
    name: 'UI', icon: '🖥️', color: '#7c3aed', bg: '#f5f3ff',
    flows: [
      [
        { n: 'HUD + 메뉴', t: 'req', p: 2, d: '게임에 맞는 HUD와 메뉴, 구성 자유' },
        { n: 'UserWidget', t: 'cha', p: 1, s: '★★', d: 'WidgetComponent로 3D 체력바' },
      ],
      [
        { n: '상황별 UI', t: 'req', p: 1, d: '상황에 맞는 정보 표시 (전투, 탐색, 이벤트)' },
        { n: 'UI 애니메이션', t: 'cha', p: 1, s: '★★', d: 'UMG Animation, 코드/플러그인 기반 트윈' },
      ],
    ]
  },
  {
    name: 'VFX / SFX', icon: '✨', color: '#ea580c', bg: '#fff7ed',
    flows: [
      [
        { n: '이펙트 & 사운드', t: 'req', p: 1, d: '필요한 곳에 파티클 & 사운드 배치' },
        { n: '디졸브 사망', t: 'cha', p: 2, s: '★★★', d: 'Material Dissolve (Opacity Mask + Timeline)' },
      ],
    ]
  },
];

const tree = document.getElementById('tree');
const tooltip = document.getElementById('tooltip');

categories.forEach(cat => {
  const section = document.createElement('div');
  section.className = 'cat-section';
  const reqCount = cat.flows.flat().filter(i => i.t === 'req').length;
  const chaCount = cat.flows.flat().filter(i => i.t === 'cha').length;

  section.innerHTML = `
    <div class="cat-header">
      <div class="cat-icon" style="background:${cat.bg};color:${cat.color}">${cat.icon}</div>
      <div class="cat-name">${cat.name}</div>
      <div class="cat-count">${reqCount > 0 ? `필수 ${reqCount}` : ''}${reqCount > 0 && chaCount > 0 ? ' · ' : ''}${chaCount > 0 ? `도전 ${chaCount}` : ''}</div>
    </div>`;

  const body = document.createElement('div');
  body.className = 'cat-body';

  cat.flows.forEach(flow => {
    const row = document.createElement('div');
    row.className = 'flow-row';
    flow.forEach((item, idx) => {
      if (idx > 0) {
        const arrow = document.createElement('span');
        arrow.className = 'arrow-connector';
        arrow.textContent = '→';
        row.appendChild(arrow);
      }
      const node = document.createElement('div');
      node.className = `node ${item.t}${item.des ? ' design-badge' : ''}`;
      let inner = item.n;
      if (item.s) inner += ` <span class="diff-stars">${item.s}</span>`;
      inner += ` <span class="pts">${item.p}점</span>`;
      node.innerHTML = inner;

      node.addEventListener('mouseenter', () => {
        let html = `<div class="t-name ${item.t}">${item.n}</div>`;
        html += `<div class="t-desc">${item.d}</div>`;
        html += `<div class="t-tags">`;
        html += `<span class="tag t-pts">${item.p}점</span>`;
        if (item.s) html += `<span class="tag t-diff">${item.s}</span>`;
        if (item.des) html += `<span class="tag t-des">설계 채점</span>`;
        html += `</div>`;
        tooltip.innerHTML = html;
        tooltip.classList.add('show');
      });
      node.addEventListener('mousemove', (e) => {
        let x = e.clientX + 16, y = e.clientY + 16;
        const r = tooltip.getBoundingClientRect();
        if (x + r.width > window.innerWidth - 20) x = e.clientX - r.width - 16;
        if (y + r.height > window.innerHeight - 20) y = e.clientY - r.height - 16;
        tooltip.style.left = x + 'px';
        tooltip.style.top = y + 'px';
      });
      node.addEventListener('mouseleave', () => tooltip.classList.remove('show'));
      row.appendChild(node);
    });
    body.appendChild(row);
  });

  section.appendChild(body);
  tree.appendChild(section);
});
</script>
</body>
</html>
