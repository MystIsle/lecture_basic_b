<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpawnActorDeferred 흐름</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #fff;
            color: #333;
            padding: 14px 20px 12px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }
        h1 { font-size: 14px; font-weight: 700; white-space: nowrap; }

        .mode-tabs { display: flex; gap: 6px; }
        .mode-tab {
            padding: 4px 14px;
            border: 1.5px solid #e5e5e5;
            border-radius: 16px;
            background: #fff;
            font-size: 11.5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            color: #999;
        }
        .mode-tab:hover { border-color: #ccc; color: #666; }
        .mode-tab.active {
            background: #ef4444;
            color: #fff;
            border-color: #ef4444;
        }
        .mode-tab.active-ok {
            background: #0d9488;
            color: #fff;
            border-color: #0d9488;
        }

        /* Flow grid: 2 rows */
        .flow-wrap {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .flow-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .step {
            flex: 0 1 180px;
            text-align: center;
            padding: 10px 8px 9px;
            border: 1.5px solid #e5e5e5;
            border-radius: 10px;
            background: #fafafa;
            position: relative;
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 62px;
        }
        .step:hover { transform: translateY(-1px); box-shadow: 0 3px 12px rgba(0,0,0,0.06); }

        /* Arrow between steps in same row */
        .arrow {
            display: flex;
            align-items: center;
            font-size: 16px;
            color: #ccc;
            flex-shrink: 0;
            margin: 0 -2px;
        }

        /* Down-arrow between rows */
        .row-arrow {
            text-align: center;
            font-size: 16px;
            color: #ccc;
            margin: -2px 0;
        }

        /* Step variants */
        .step.highlight {
            background: linear-gradient(135deg, #fefce8, #fef9c3);
            border-color: #f59e0b;
            border-width: 2px;
        }
        .step.danger {
            background: linear-gradient(135deg, #fef2f2, #fee2e2);
            border-color: #ef4444;
            border-width: 2px;
        }
        .step.ok {
            background: linear-gradient(135deg, #f0fdfa, #ccfbf1);
            border-color: #0d9488;
            border-width: 2px;
        }

        /* Badge */
        .badge {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            font-weight: 700;
            padding: 1px 10px;
            border-radius: 10px;
            color: #fff;
            white-space: nowrap;
        }
        .badge-warn { background: #f59e0b; }
        .badge-danger { background: #ef4444; }
        .badge-ok { background: #0d9488; }

        .step-num {
            font-size: 10px;
            font-weight: 700;
            color: #0d9488;
            margin-bottom: 2px;
        }
        .step.highlight .step-num { color: #d97706; }
        .step.danger .step-num { color: #ef4444; }

        .step-name {
            font-size: 11.5px;
            font-weight: 700;
            color: #333;
            line-height: 1.3;
        }
        .step-sub {
            font-size: 10px;
            color: #888;
            margin-top: 2px;
            line-height: 1.3;
        }
        .step.danger .step-sub { color: #ef4444; font-weight: 600; }
        .step.ok .step-sub { color: #0d9488; font-weight: 600; }

        .caption {
            margin-top: 10px;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 11.5px;
            line-height: 1.5;
            color: #555;
            transition: all 0.3s;
        }
        .caption-ok {
            background: #f0fdfa;
            border-left: 3px solid #0d9488;
        }
        .caption-danger {
            background: #fef2f2;
            border-left: 3px solid #ef4444;
        }
        .caption strong { font-weight: 700; color: #333; }
    </style>
</head>
<body>
    <div class="header">
        <h1>SpawnActorDeferred 흐름</h1>
        <div class="mode-tabs">
            <button class="mode-tab active" id="tab-normal" onclick="setMode('normal')">일반 Spawn</button>
            <button class="mode-tab" id="tab-deferred" onclick="setMode('deferred')">Deferred (권장)</button>
        </div>
    </div>

    <div class="flow-wrap" id="flow"></div>
    <div class="caption" id="caption"></div>

    <script>
        const modes = {
            normal: {
                rows: [
                    [
                        { num: '1', name: 'SpawnActor', sub: '즉시 실행', type: '' },
                        { num: '2', name: 'PostInitComponents', sub: '컴포넌트 초기화', type: '' },
                        { num: '3', name: 'BeginPlay', sub: 'MonsterID = ???', type: 'danger', badge: '문제!', badgeClass: 'badge-danger' }
                    ],
                    [
                        { num: '4', name: '뒤늦은 데이터 주입', sub: 'MonsterID, MaxHP...', type: 'danger', badge: '이미 늦음', badgeClass: 'badge-danger' },
                        { num: '5', name: '재초기화 필요', sub: '수동으로 다시 셋업', type: '' }
                    ]
                ],
                caption: '<strong>일반 Spawn</strong> : 초기화가 먼저 끝나기 때문에 BeginPlay 시점에 데이터가 없습니다. 나중에 주입해도 이미 늦은 상태입니다.',
                captionClass: 'caption-danger'
            },
            deferred: {
                rows: [
                    [
                        { num: '1', name: 'SpawnActor', sub: 'bDeferConstruction = true', type: '' },
                        { num: '2', name: '데이터 주입', sub: 'MonsterID, MaxHP...', type: 'highlight', badge: '핵심!', badgeClass: 'badge-warn' },
                        { num: '3', name: 'FinishSpawning', sub: '초기화 시작', type: '' }
                    ],
                    [
                        { num: '4', name: 'PostInitComponents', sub: '컴포넌트 셋업', type: '' },
                        { num: '5', name: 'BeginPlay', sub: '데이터 준비 완료!', type: 'ok', badge: '안전!', badgeClass: 'badge-ok' }
                    ]
                ],
                caption: '<strong>Deferred 방식</strong> : SpawnActor 후 초기화를 미뤄두고 데이터를 먼저 주입합니다. FinishSpawning을 호출하면 그때 초기화가 시작되어, BeginPlay에서 모든 데이터가 준비된 상태입니다.',
                captionClass: 'caption-ok'
            }
        };

        let currentMode = 'normal';

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('tab-normal').className =
                'mode-tab' + (mode === 'normal' ? ' active' : '');
            document.getElementById('tab-deferred').className =
                'mode-tab' + (mode === 'deferred' ? ' active-ok' : '');
            render();
        }

        function render() {
            const data = modes[currentMode];
            const flow = document.getElementById('flow');
            const caption = document.getElementById('caption');

            let html = '';
            data.rows.forEach((row, ri) => {
                if (ri > 0) {
                    html += '<div class="row-arrow">↓</div>';
                }
                html += '<div class="flow-row">';
                row.forEach((s, si) => {
                    if (si > 0) {
                        html += '<div class="arrow">→</div>';
                    }
                    const badgeHtml = s.badge
                        ? `<span class="badge ${s.badgeClass}">${s.badge}</span>` : '';
                    html += `
                        <div class="step ${s.type}">
                            ${badgeHtml}
                            <div class="step-num">STEP ${s.num}</div>
                            <div class="step-name">${s.name}</div>
                            <div class="step-sub">${s.sub}</div>
                        </div>`;
                });
                html += '</div>';
            });

            flow.innerHTML = html;
            caption.innerHTML = data.caption;
            caption.className = 'caption ' + data.captionClass;
        }

        render();
    </script>
</body>
</html>
