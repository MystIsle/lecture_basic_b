<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameMode vs GameState</title>
    <link rel="stylesheet" href="../../shared/css/common.css">
    <style>
        body { padding: 16px 20px; }

        .layout {
            display: flex;
            gap: 16px;
            width: 100%;
            max-width: 100%;
        }

        .side {
            flex: 1;
            background: #fff;
            border: 2px solid #e5e5e5;
            border-radius: 10px;
            padding: 20px 24px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .side:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.06); }

        .side-gamemode { border-color: #dc2626; }
        .side-gamemode.active { background: #fef2f2; box-shadow: 0 0 0 2px #fecaca; }
        .side-gamestate { border-color: #d97706; }
        .side-gamestate.active { background: #fffbeb; box-shadow: 0 0 0 2px #fed7aa; }

        .side-icon {
            font-size: 1.6rem;
            margin-bottom: 6px;
        }
        .side-name {
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: 2px;
        }
        .side-gamemode .side-name { color: #dc2626; }
        .side-gamestate .side-name { color: #d97706; }

        .side-role {
            font-size: 0.8rem;
            color: #999;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .side-items {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .side-items li {
            font-size: 0.85rem;
            color: #555;
            padding: 5px 0 5px 18px;
            position: relative;
            line-height: 1.5;
        }
        .side-items li::before {
            content: "";
            position: absolute;
            left: 0;
            top: 12px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .side-gamemode .side-items li::before { background: #fecaca; }
        .side-gamestate .side-items li::before { background: #fed7aa; }

        .side-tag {
            margin-top: 14px;
            padding-top: 10px;
            border-top: 1px solid #f0f0f0;
            font-size: 0.78rem;
            font-weight: 600;
        }
        .side-gamemode .side-tag { color: #dc2626; }
        .side-gamestate .side-tag { color: #d97706; }

        .vs-divider {
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }
        .vs-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #fafafa;
            border: 2px solid #e5e5e5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            color: #999;
        }

        .bottom-caption {
            margin-top: 14px;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 0.82rem;
            color: #555;
            line-height: 1.5;
            text-align: center;
            background: #f0fdfa;
            border: 1px solid #99f6e4;
            transition: all 0.3s;
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="side side-gamemode" id="sideGM" onclick="toggle('gm')">
            <div class="side-icon">🏁</div>
            <div class="side-name">GameMode</div>
            <div class="side-role">심판</div>
            <ul class="side-items">
                <li>승리/패배 조건 판단</li>
                <li>리스폰 정책 결정</li>
                <li>게임 시작/종료 로직</li>
                <li>참가 인원 관리</li>
            </ul>
            <div class="side-tag">판단하는 곳</div>
        </div>

        <div class="vs-divider">
            <div class="vs-circle">vs</div>
        </div>

        <div class="side side-gamestate" id="sideGS" onclick="toggle('gs')">
            <div class="side-icon">📊</div>
            <div class="side-name">GameState</div>
            <div class="side-role">전광판</div>
            <ul class="side-items">
                <li>현재 점수 보관</li>
                <li>경과 시간 기록</li>
                <li>남은 적 수 표시</li>
                <li>라운드 정보 저장</li>
            </ul>
            <div class="side-tag">보여주는 곳</div>
        </div>
    </div>

    <div class="bottom-caption" id="caption">
        클릭해서 비교해보세요. 분리하면 규칙을 바꿔도 상태 표시가 깨지지 않습니다.
    </div>

    <script>
        let selected = null;
        function toggle(which) {
            const gm = document.getElementById('sideGM');
            const gs = document.getElementById('sideGS');
            const caption = document.getElementById('caption');

            if (selected === which) {
                gm.classList.remove('active');
                gs.classList.remove('active');
                caption.textContent = '클릭해서 비교해보세요. 분리하면 규칙을 바꿔도 상태 표시가 깨지지 않습니다.';
                selected = null;
                return;
            }
            selected = which;
            gm.classList.toggle('active', which === 'gm');
            gs.classList.toggle('active', which === 'gs');

            if (which === 'gm') {
                caption.textContent = '같은 맵에서 모드만 바꾸고 싶을 때, GameMode만 교체하면 됩니다. 맵, 캐릭터 그대로.';
            } else {
                caption.textContent = '현재 상태 데이터만 보관합니다. 규칙(GameMode)이 바뀌어도 여기는 영향 없습니다.';
            }
        }
    </script>
</body>
</html>
