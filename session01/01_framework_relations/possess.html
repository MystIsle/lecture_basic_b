<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>빙의 (Possess)</title>
    <link rel="stylesheet" href="../../shared/css/common.css">
    <style>
        body { padding: 16px 20px; }

        .possess-area {
            background: #fafafa;
            border: 1px solid #e5e5e5;
            border-radius: 10px;
            padding: 24px 32px;
            position: relative;
        }

        .possess-row {
            display: flex;
            align-items: center;
            gap: 0;
            justify-content: center;
            position: relative;
            min-height: 80px;
        }

        .node {
            background: #fff;
            border: 2px solid #e5e5e5;
            border-radius: 10px;
            padding: 14px 20px;
            text-align: center;
            transition: all 0.4s ease;
            min-width: 150px;
            position: relative;
            z-index: 2;
        }
        .node-name { font-weight: 700; font-size: 0.92rem; }
        .node-sub { font-size: 0.78rem; color: #999; margin-top: 2px; }

        .node-controller {
            border-color: #2563eb;
            background: rgba(37, 99, 235, 0.04);
        }
        .node-controller .node-name { color: #2563eb; }

        .node-pawn {
            border-color: #0d9488;
            background: rgba(13, 148, 136, 0.04);
        }
        .node-pawn .node-name { color: #0d9488; }
        .node-pawn.possessed {
            background: rgba(13, 148, 136, 0.12);
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.2);
            border-color: #0d9488;
        }
        .node-pawn.dimmed {
            opacity: 0.4;
            border-color: #ddd;
        }

        .possess-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #0d9488;
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .possessed .possess-badge { opacity: 1; }

        /* SVG 화살표 */
        .arrow-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .arrow-path {
            stroke: #2563eb;
            stroke-width: 2;
            stroke-dasharray: 6 4;
            fill: none;
            transition: d 0.4s ease;
        }
        .arrow-head {
            fill: #2563eb;
            transition: all 0.4s ease;
        }

        /* 간격 요소 */
        .spacer { width: 80px; flex-shrink: 0; }
        .pawn-gap { width: 40px; flex-shrink: 0; }

        .controls {
            display: flex;
            justify-content: center;
            margin-top: 16px;
        }
        .toggle-btn {
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 24px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Segoe UI', sans-serif;
        }
        .toggle-btn:hover { background: #1d4ed8; }

        .caption {
            text-align: center;
            font-size: 0.82rem;
            color: #666;
            margin-top: 12px;
            line-height: 1.5;
            min-height: 24px;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <div class="possess-area">
        <div class="possess-row" id="row">
            <div class="node node-controller" id="controller">
                <div class="node-name">PlayerController</div>
                <div class="node-sub">플레이어의 의지</div>
            </div>

            <div class="spacer"></div>

            <div class="node node-pawn possessed" id="pawnA">
                <span class="possess-badge">빙의 중</span>
                <div class="node-name">Character</div>
                <div class="node-sub">걸어다니는 캐릭터</div>
            </div>

            <div class="pawn-gap"></div>

            <div class="node node-pawn dimmed" id="pawnB">
                <span class="possess-badge">빙의 중</span>
                <div class="node-name">Vehicle Pawn</div>
                <div class="node-sub">차량</div>
            </div>

            <svg class="arrow-svg" id="arrowSvg"></svg>
        </div>

        <div class="controls">
            <button class="toggle-btn" onclick="togglePossess()">빙의 전환</button>
        </div>

        <div class="caption" id="caption">
            Controller가 캐릭터에 빙의 중. 이동, 공격 가능.
        </div>
    </div>

    <script>
        let possessingA = true;

        function drawArrow() {
            const svg = document.getElementById('arrowSvg');
            const row = document.getElementById('row');
            const ctrl = document.getElementById('controller');
            const target = possessingA ? document.getElementById('pawnA') : document.getElementById('pawnB');

            const rowRect = row.getBoundingClientRect();
            const ctrlRect = ctrl.getBoundingClientRect();
            const targetRect = target.getBoundingClientRect();

            // Start: right edge of controller
            const x1 = ctrlRect.right - rowRect.left;
            const y1 = ctrlRect.top - rowRect.top + ctrlRect.height / 2;

            // End: left edge of target
            const x2 = targetRect.left - rowRect.left;
            const y2 = targetRect.top - rowRect.top + targetRect.height / 2;

            svg.setAttribute('viewBox', `0 0 ${rowRect.width} ${rowRect.height}`);
            svg.style.width = rowRect.width + 'px';
            svg.style.height = rowRect.height + 'px';

            svg.innerHTML = `
                <defs>
                    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                        <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
                    </marker>
                </defs>
                <line x1="${x1}" y1="${y1}" x2="${x2 - 2}" y2="${y2}"
                      stroke="#2563eb" stroke-width="2" stroke-dasharray="6 4"
                      marker-end="url(#ah)"/>
            `;
        }

        function togglePossess() {
            possessingA = !possessingA;
            update();
        }

        function update() {
            const pawnA = document.getElementById('pawnA');
            const pawnB = document.getElementById('pawnB');
            const caption = document.getElementById('caption');

            pawnA.className = 'node node-pawn ' + (possessingA ? 'possessed' : 'dimmed');
            pawnB.className = 'node node-pawn ' + (possessingA ? 'dimmed' : 'possessed');

            caption.textContent = possessingA
                ? 'Controller가 캐릭터에 빙의 중. 이동, 공격 가능.'
                : 'Controller가 차량에 빙의 중. 조종 주체는 같고 몸체만 변경.';

            drawArrow();
        }

        // Init
        update();
        window.addEventListener('resize', drawArrow);
    </script>
</body>
</html>
