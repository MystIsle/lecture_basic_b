<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>슈퍼클래스가 커지는 과정</title>
  <link rel="stylesheet" href="../../shared/css/common.css">
  <style>
    body {
      background-color: #ffffff;
      color: #333;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 32px;
      font-weight: 600;
      margin: 0 0 10px 0;
      color: #333;
    }

    .subtitle {
      font-size: 16px;
      color: #999;
      margin: 0;
    }

    /* Step navigation buttons */
    .step-nav {
      display: flex;
      gap: 12px;
      margin-bottom: 50px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .step-btn {
      padding: 10px 20px;
      border: 1px solid #e5e5e5;
      background-color: #ffffff;
      color: #333;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      border-radius: 4px;
      transition: all 0.3s ease;
    }

    .step-btn:hover {
      background-color: #fafafa;
      border-color: #d5d5d5;
    }

    .step-btn.active {
      color: #ffffff;
      font-weight: 600;
    }

    .step-btn[data-step="1"].active {
      background-color: #0d9488;
      border-color: #0d9488;
    }

    .step-btn[data-step="2"].active {
      background-color: #0d9488;
      border-color: #0d9488;
    }

    .step-btn[data-step="3"].active {
      background-color: #d97706;
      border-color: #d97706;
    }

    .step-btn[data-step="4"].active {
      background-color: #dc2626;
      border-color: #dc2626;
    }

    /* Main visualization area */
    .visualization {
      display: flex;
      justify-content: center;
      margin-bottom: 40px;
      min-height: 600px;
    }

    /* Class box */
    .class-box {
      background-color: #fafafa;
      border: 2px solid #0d9488;
      border-radius: 6px;
      padding: 24px;
      max-width: 500px;
      width: 100%;
      transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
    }

    .class-box.step-3 {
      border-color: #d97706;
    }

    .class-box.step-4 {
      border-color: #dc2626;
    }

    /* Class header */
    .class-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
      gap: 16px;
    }

    .class-name {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }

    .line-count-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      animation: badge-pulse 0.5s ease-out;
    }

    .line-count-badge.step-1,
    .line-count-badge.step-2 {
      background-color: #d1fae5;
      color: #0d9488;
    }

    .line-count-badge.step-3 {
      background-color: #fef3c7;
      color: #d97706;
    }

    .line-count-badge.step-4 {
      background-color: #fee2e2;
      color: #dc2626;
    }

    @keyframes badge-pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.05);
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* Methods list */
    .methods-list {
      border-top: 1px solid #e5e5e5;
      padding-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .method-item {
      font-size: 14px;
      color: #333;
      opacity: 0;
      animation: method-fade-in 0.5s ease-out forwards;
      padding-left: 16px;
      position: relative;
      font-family: 'Monaco', 'Menlo', monospace;
    }

    .method-item::before {
      content: '→';
      position: absolute;
      left: 0;
      color: #999;
    }

    .method-item.step-1 {
      animation-delay: 0s;
    }

    .method-item.step-2 {
      animation-delay: 0.1s;
    }

    .method-item.step-3 {
      animation-delay: 0.2s;
    }

    .method-item.step-4 {
      animation-delay: 0.3s;
    }

    .method-item.step-5 {
      animation-delay: 0.4s;
    }

    .method-item.step-6 {
      animation-delay: 0.5s;
    }

    @keyframes method-fade-in {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Caption */
    .caption {
      margin-top: 40px;
      text-align: center;
      font-size: 15px;
      line-height: 1.6;
      color: #333;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-color: #fafafa;
      border-radius: 6px;
      border-left: 4px solid #0d9488;
      transition: all 0.5s ease;
    }

    .caption.step-3 {
      border-left-color: #d97706;
    }

    .caption.step-4 {
      border-left-color: #dc2626;
    }

    /* Keyboard hint */
    .keyboard-hint {
      text-align: center;
      font-size: 13px;
      color: #999;
      margin-top: 30px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      h1 {
        font-size: 26px;
      }

      .step-nav {
        gap: 8px;
      }

      .step-btn {
        padding: 8px 16px;
        font-size: 13px;
      }

      .class-box {
        padding: 18px;
      }

      .class-name {
        font-size: 16px;
      }

      .method-item {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>슈퍼클래스가 커지는 과정</h1>
      <p class="subtitle">단계를 클릭해서 진행해보세요</p>
    </div>

    <div class="step-nav">
      <button class="step-btn active" data-step="1">Step 1: 이동 구현</button>
      <button class="step-btn" data-step="2">Step 2: 공격 추가</button>
      <button class="step-btn" data-step="3">Step 3: 게임 규칙</button>
      <button class="step-btn" data-step="4">Step 4: UI·데이터·아이템</button>
    </div>

    <div class="visualization">
      <div class="class-box step-1" id="classBox">
        <div class="class-header">
          <div class="class-name">APlayerCharacter</div>
          <div class="line-count-badge step-1" id="lineBadge">~50줄</div>
        </div>
        <div class="methods-list" id="methodsList">
          <div class="method-item step-1">MoveForward()</div>
          <div class="method-item step-1">MoveRight()</div>
          <div class="method-item step-1">Jump()</div>
        </div>
      </div>
    </div>

    <div class="caption" id="caption">
      처음엔 이동만 구현합니다. 깔끔하죠?
    </div>

    <div class="keyboard-hint">
      💡 화살표 키로도 조작할 수 있습니다
    </div>
  </div>

  <script>
    const steps = [
      {
        step: 1,
        title: 'Step 1: 이동 구현',
        lineCount: '~50줄',
        borderClass: 'step-1',
        badgeClass: 'step-1',
        methods: [
          'MoveForward()',
          'MoveRight()',
          'Jump()'
        ],
        caption: '처음엔 이동만 구현합니다. 깔끔하죠?'
      },
      {
        step: 2,
        title: 'Step 2: 공격 추가',
        lineCount: '~200줄',
        borderClass: 'step-1',
        badgeClass: 'step-2',
        methods: [
          'MoveForward()',
          'MoveRight()',
          'Jump()',
          'BasicAttack()',
          'PlayAttackAnim()',
          'ApplyDamage()'
        ],
        caption: '공격을 추가해도 아직 괜찮습니다.'
      },
      {
        step: 3,
        title: 'Step 3: 게임 규칙 추가',
        lineCount: '~800줄',
        borderClass: 'step-3',
        badgeClass: 'step-3',
        methods: [
          'MoveForward()',
          'MoveRight()',
          'Jump()',
          'BasicAttack()',
          'PlayAttackAnim()',
          'ApplyDamage()',
          'CalculateScore()',
          'CheckGameOver()',
          'UpdateTimer()',
          'RespawnPlayer()'
        ],
        caption: '슬슬 스크롤이 길어집니다...'
      },
      {
        step: 4,
        title: 'Step 4: UI·데이터·아이템...',
        lineCount: '3,000줄',
        borderClass: 'step-4',
        badgeClass: 'step-4',
        methods: [
          'MoveForward()',
          'MoveRight()',
          'Jump()',
          'BasicAttack()',
          'PlayAttackAnim()',
          'ApplyDamage()',
          'CalculateScore()',
          'CheckGameOver()',
          'UpdateTimer()',
          'RespawnPlayer()',
          'UpdateHP()',
          'UpdateHUD()',
          'SaveData()',
          'LoadInventory()',
          'AddItem()',
          'RemoveItem()'
        ],
        caption: '2주 전에 짠 코드인데 \'이거 왜 여기 있지?\' 싶은 순간이 옵니다.'
      }
    ];

    let currentStep = 0;

    const classBox = document.getElementById('classBox');
    const lineBadge = document.getElementById('lineBadge');
    const methodsList = document.getElementById('methodsList');
    const caption = document.getElementById('caption');
    const buttons = document.querySelectorAll('.step-btn');

    function updateStep(stepIndex) {
      currentStep = stepIndex;
      const stepData = steps[stepIndex];

      // Update class box border
      classBox.className = 'class-box ' + stepData.borderClass;

      // Update line count badge
      lineBadge.className = 'line-count-badge ' + stepData.badgeClass;
      lineBadge.textContent = stepData.lineCount;

      // Update methods list with animation
      methodsList.innerHTML = '';
      stepData.methods.forEach((method, index) => {
        const methodItem = document.createElement('div');
        methodItem.className = 'method-item step-' + (index + 1);
        methodItem.textContent = method;
        methodsList.appendChild(methodItem);
      });

      // Update caption
      caption.className = 'caption ' + stepData.borderClass;
      caption.textContent = stepData.caption;

      // Update button states
      buttons.forEach((btn, idx) => {
        btn.classList.toggle('active', idx === stepIndex);
      });
    }

    // Event listeners for buttons
    buttons.forEach((btn, index) => {
      btn.addEventListener('click', () => {
        updateStep(index);
      });
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' && currentStep < steps.length - 1) {
        updateStep(currentStep + 1);
      } else if (e.key === 'ArrowLeft' && currentStep > 0) {
        updateStep(currentStep - 1);
      }
    });

    // Initialize
    updateStep(0);
  </script>
</body>
</html>
