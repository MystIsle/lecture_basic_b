<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>속도 · 가속 · 마찰</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #fff;
            color: #333;
            padding: 30px 16px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 15px;
            color: #999;
        }

        /* === Tabs === */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            border-bottom: 1.5px solid #e5e5e5;
        }

        .tab-btn {
            padding: 10px 14px;
            border: none;
            background: transparent;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            color: #999;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn:hover { color: #2563eb; }

        .tab-btn.active {
            color: #2563eb;
            border-bottom-color: #2563eb;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* === Track === */
        .track-section {
            background: #fafafa;
            border: 1.5px solid #e5e5e5;
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 16px;
        }

        .section-label {
            font-size: 13px;
            font-weight: 600;
            color: #999;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .track {
            position: relative;
            height: 44px;
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            overflow: hidden;
        }

        .ball {
            position: absolute;
            width: 22px;
            height: 22px;
            background: #2563eb;
            border-radius: 50%;
            top: 50%;
            left: 10px;
            transform: translateY(-50%);
            box-shadow: 0 2px 6px rgba(37,99,235,0.3);
            z-index: 10;
        }

        .speed-badge {
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 13px;
            font-weight: 700;
            color: #be185d;
            font-family: 'Courier New', monospace;
        }

        /* === Graph === */
        .graph-section {
            background: #fafafa;
            border: 1.5px solid #e5e5e5;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
        }

        canvas {
            width: 100%;
            height: 160px;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            background: #fff;
        }

        /* === Sim Mode Buttons === */
        .sim-modes {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .sim-btn {
            padding: 9px 14px;
            border: 2px solid #e5e5e5;
            background: #fff;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: #666;
            transition: all 0.2s;
            flex: 1;
            text-align: center;
        }

        .sim-btn:hover { border-color: #999; }

        .sim-btn.active {
            color: #fff;
        }

        .sim-btn[data-sim="0"].active { background: #2563eb; border-color: #2563eb; }
        .sim-btn[data-sim="1"].active { background: #f59e0b; border-color: #f59e0b; }
        .sim-btn[data-sim="2"].active { background: #be185d; border-color: #be185d; }
        .sim-btn[data-sim="3"].active { background: #7c3aed; border-color: #7c3aed; }

        /* === Controls === */
        .ctrl-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .ctrl-btn {
            padding: 10px 16px;
            border: 1.5px solid #e5e5e5;
            background: #fafafa;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: #333;
            transition: all 0.15s;
        }

        .ctrl-btn:hover {
            border-color: #2563eb;
            color: #2563eb;
        }

        .ctrl-btn.go {
            background: #2563eb;
            border-color: #2563eb;
            color: #fff;
            flex: 1;
        }

        .ctrl-btn.go:hover { background: #1d4ed8; }

        .ctrl-btn.go.active-move {
            background: #dc2626;
            border-color: #dc2626;
        }

        .ctrl-btn.go.active-move:hover { background: #b91c1c; }

        .ctrl-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* === Sliders === */
        .controls-section {
            background: #fafafa;
            border: 1.5px solid #e5e5e5;
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 16px;
        }

        .slider-group {
            margin-bottom: 14px;
            transition: opacity 0.2s;
        }

        .slider-group:last-child { margin-bottom: 0; }

        .slider-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .slider-name {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .slider-val {
            font-size: 14px;
            font-weight: 600;
            color: #2563eb;
            font-family: 'Courier New', monospace;
            background: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            min-width: 50px;
            text-align: right;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #e5e5e5;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #2563eb;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(37,99,235,0.3);
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #2563eb;
            cursor: pointer;
            border: none;
        }

        input[type="range"]:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* === Code Display === */
        .code-box {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 14px 16px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.8;
            color: #333;
            margin-bottom: 16px;
        }

        .ck { color: #2563eb; }
        .cv { color: #be185d; font-weight: 600; }
        .co { color: #f59e0b; font-weight: 700; }
        .cp { color: #7c3aed; font-weight: 600; }

        /* === Manual Step === */
        .step-card {
            background: #fff;
            border: 1.5px solid #e5e5e5;
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 16px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 2;
            color: #333;
            min-height: 80px;
        }

        .step-card .frame-num {
            font-size: 15px;
            font-weight: 700;
            color: #2563eb;
        }

        .step-card .calc {
            margin-left: 12px;
        }

        /* === Log Table === */
        .log-wrap {
            max-height: 200px;
            overflow-y: auto;
            border: 1.5px solid #e5e5e5;
            border-radius: 8px;
            background: #fff;
            margin-bottom: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            position: sticky;
            top: 0;
            background: #f9fafb;
        }

        th {
            padding: 8px 10px;
            text-align: right;
            font-weight: 600;
            color: #666;
            border-bottom: 1.5px solid #e5e5e5;
        }

        th:first-child { text-align: center; width: 50px; }

        td {
            padding: 7px 10px;
            text-align: right;
            color: #555;
            border-bottom: 1px solid #f0f0f0;
            font-family: 'Courier New', monospace;
        }

        td:first-child {
            text-align: center;
            font-weight: 600;
            color: #2563eb;
        }

        tr.current td {
            background: #eff6ff;
            color: #1e40af;
            font-weight: 600;
        }

        /* === Note === */
        .note {
            text-align: center;
            font-size: 14px;
            color: #666;
            padding: 14px 16px;
            background: #fffbeb;
            border: 1.5px solid #f59e0b;
            border-radius: 8px;
            line-height: 1.6;
        }

        .note strong { color: #333; }

        .placeholder {
            color: #ccc;
            text-align: center;
            padding: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>속도 · 가속 · 마찰</h1>
            <p>한 줄씩 추가하면 물리가 된다</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="tab-auto">자동 재생</button>
            <button class="tab-btn" data-tab="tab-manual">수동 스텝</button>
        </div>

        <!-- =============== TAB: 자동 재생 =============== -->
        <div id="tab-auto" class="tab-content active">
            <!-- Sim mode -->
            <div class="sim-modes" id="simModes">
                <button class="sim-btn active" data-sim="0">등속</button>
                <button class="sim-btn" data-sim="1">가속</button>
                <button class="sim-btn" data-sim="2">가속+마찰</button>
                <button class="sim-btn" data-sim="3">최대속도</button>
            </div>

            <!-- Track -->
            <div class="track-section">
                <div class="section-label">객체 위치</div>
                <div class="track" id="aTrack">
                    <div class="ball" id="aBall"></div>
                    <div class="speed-badge" id="aSpeedBadge">0</div>
                </div>
            </div>

            <!-- Graph -->
            <div class="graph-section">
                <div class="section-label">속도 변화 그래프</div>
                <canvas id="aGraph" width="660" height="160"></canvas>
            </div>

            <!-- Controls -->
            <div class="ctrl-row">
                <button class="ctrl-btn go" id="aMoveBtn">이동</button>
                <button class="ctrl-btn" id="aStopBtn" disabled>정지</button>
                <button class="ctrl-btn" id="aResetBtn">리셋</button>
            </div>

            <!-- Sliders -->
            <div class="controls-section">
                <div class="slider-group" id="sg-speed">
                    <div class="slider-label">
                        <span class="slider-name">속도 (Speed)</span>
                        <span class="slider-val" id="dSpeed">300</span>
                    </div>
                    <input type="range" id="sSpeed" min="50" max="600" value="300">
                </div>

                <div class="slider-group" id="sg-accel">
                    <div class="slider-label">
                        <span class="slider-name">가속도 (Acceleration)</span>
                        <span class="slider-val" id="dAccel">200</span>
                    </div>
                    <input type="range" id="sAccel" min="0" max="500" value="200">
                </div>

                <div class="slider-group" id="sg-friction">
                    <div class="slider-label">
                        <span class="slider-name">마찰 (Friction)</span>
                        <span class="slider-val" id="dFriction">3.0</span>
                    </div>
                    <input type="range" id="sFriction" min="0" max="10" value="3" step="0.1">
                </div>

                <div class="slider-group" id="sg-maxspeed">
                    <div class="slider-label">
                        <span class="slider-name">최대속도 (MaxSpeed)</span>
                        <span class="slider-val" id="dMaxSpeed">400</span>
                    </div>
                    <input type="range" id="sMaxSpeed" min="100" max="800" value="400">
                </div>
            </div>

            <!-- Code -->
            <div class="code-box" id="aCode"></div>

            <div class="note">
                <strong>이동</strong>을 누르면 힘이 가해지고,
                <strong>정지</strong>를 누르면 힘이 사라집니다.<br>
                마찰이 있으면 서서히 멈추고, 없으면 영원히 미끄러집니다.
            </div>
        </div>

        <!-- =============== TAB: 수동 스텝 =============== -->
        <div id="tab-manual" class="tab-content">
            <!-- Track -->
            <div class="track-section">
                <div class="section-label">객체 위치</div>
                <div class="track" id="mTrack">
                    <div class="ball" id="mBall"></div>
                    <div class="speed-badge" id="mSpeedBadge">0</div>
                </div>
            </div>

            <!-- Graph -->
            <div class="graph-section">
                <div class="section-label">속도 변화 그래프</div>
                <canvas id="mGraph" width="660" height="160"></canvas>
            </div>

            <!-- Controls -->
            <div class="ctrl-row">
                <button class="ctrl-btn go" id="mStepBtn">한 프레임 진행</button>
                <button class="ctrl-btn" id="mResetBtn">리셋</button>
            </div>

            <!-- Sliders -->
            <div class="controls-section">
                <div class="slider-group">
                    <div class="slider-label">
                        <span class="slider-name">가속도 (Acceleration)</span>
                        <span class="slider-val" id="dAccelM">200</span>
                    </div>
                    <input type="range" id="sAccelM" min="0" max="500" value="200">
                </div>

                <div class="slider-group">
                    <div class="slider-label">
                        <span class="slider-name">마찰 (Friction)</span>
                        <span class="slider-val" id="dFrictionM">3.0</span>
                    </div>
                    <input type="range" id="sFrictionM" min="0" max="10" value="3" step="0.1">
                </div>
            </div>

            <!-- Step Card -->
            <div class="step-card" id="mStepCard">
                <div class="placeholder">한 프레임 진행 버튼을 눌러 시작하세요</div>
            </div>

            <!-- Log -->
            <div class="section-label">프레임 로그</div>
            <div class="log-wrap" id="mLogWrap">
                <table>
                    <thead><tr><th>#</th><th>Speed</th><th>이동량</th><th>위치</th></tr></thead>
                    <tbody id="mLogBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ========================
        //  Constants
        // ========================
        const DT = 0.016;
        const TRACK_MAX = 600; // position wraps at this

        // ========================
        //  Auto Mode State
        // ========================
        let simMode = 0; // 0=등속, 1=가속, 2=가속+마찰, 3=최대속도
        const A = {
            moving: false,   // is force being applied?
            running: false,  // is animation loop running?
            pos: 0,
            speed: 0,
            time: 0,
            pts: [],         // graph points
            raf: null
        };

        // DOM - Auto
        const aBall = document.getElementById('aBall');
        const aSpeedBadge = document.getElementById('aSpeedBadge');
        const aGraph = document.getElementById('aGraph');
        const aMoveBtn = document.getElementById('aMoveBtn');
        const aStopBtn = document.getElementById('aStopBtn');
        const aResetBtn = document.getElementById('aResetBtn');
        const aCode = document.getElementById('aCode');
        const sSpeed = document.getElementById('sSpeed');
        const sAccel = document.getElementById('sAccel');
        const sFriction = document.getElementById('sFriction');
        const sMaxSpeed = document.getElementById('sMaxSpeed');

        // Slider displays
        function hookSlider(slider, display, suffix) {
            slider.addEventListener('input', () => {
                display.textContent = parseFloat(slider.value).toFixed(suffix ? 1 : 0);
            });
        }

        hookSlider(sSpeed, document.getElementById('dSpeed'), false);
        hookSlider(sAccel, document.getElementById('dAccel'), false);
        hookSlider(sFriction, document.getElementById('dFriction'), true);
        hookSlider(sMaxSpeed, document.getElementById('dMaxSpeed'), false);
        hookSlider(document.getElementById('sAccelM'), document.getElementById('dAccelM'), false);
        hookSlider(document.getElementById('sFrictionM'), document.getElementById('dFrictionM'), true);

        // ========================
        //  Tab Switching
        // ========================
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
                // pause auto on tab switch
                if (A.running) { cancelAnimationFrame(A.raf); A.running = false; }
            });
        });

        // ========================
        //  Sim Mode Switching
        // ========================
        const sliderGroups = {
            speed: document.getElementById('sg-speed'),
            accel: document.getElementById('sg-accel'),
            friction: document.getElementById('sg-friction'),
            maxspeed: document.getElementById('sg-maxspeed')
        };

        // Which sliders are active per mode
        const modeSliders = {
            0: ['speed'],
            1: ['accel'],
            2: ['accel', 'friction'],
            3: ['accel', 'friction', 'maxspeed']
        };

        const modeColors = ['#2563eb', '#f59e0b', '#be185d', '#7c3aed'];

        function setSimMode(mode) {
            simMode = mode;
            // buttons
            document.querySelectorAll('.sim-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.sim-btn[data-sim="${mode}"]`).classList.add('active');

            // sliders
            const active = modeSliders[mode];
            Object.keys(sliderGroups).forEach(key => {
                const on = active.includes(key);
                const g = sliderGroups[key];
                g.style.opacity = on ? '1' : '0.35';
                g.querySelector('input').disabled = !on;
            });

            updateCodeDisplay();
            resetAuto();
        }

        document.querySelectorAll('.sim-btn').forEach(btn => {
            btn.addEventListener('click', () => setSimMode(parseInt(btn.dataset.sim)));
        });

        // ========================
        //  Code Display
        // ========================
        function updateCodeDisplay() {
            const lines = {
                0: [
                    '<span class="ck">Loc</span> <span class="co">+=</span> <span class="ck">Forward</span> <span class="co">*</span> <span class="cv">Speed</span> <span class="co">*</span> dt'
                ],
                1: [
                    '<span class="cv">Speed</span> <span class="co">+=</span> <span class="cv">Accel</span> <span class="co">*</span> dt',
                    '<span class="ck">Loc</span> <span class="co">+=</span> <span class="ck">Forward</span> <span class="co">*</span> <span class="cv">Speed</span> <span class="co">*</span> dt'
                ],
                2: [
                    '<span class="cv">Speed</span> <span class="co">+=</span> <span class="cv">Accel</span> <span class="co">*</span> dt',
                    '<span class="cv">Speed</span> <span class="co">*=</span> (1 <span class="co">-</span> <span class="cv">Friction</span> <span class="co">*</span> dt)',
                    '<span class="ck">Loc</span> <span class="co">+=</span> <span class="ck">Forward</span> <span class="co">*</span> <span class="cv">Speed</span> <span class="co">*</span> dt'
                ],
                3: [
                    '<span class="cv">Speed</span> <span class="co">+=</span> <span class="cv">Accel</span> <span class="co">*</span> dt',
                    '<span class="cv">Speed</span> <span class="co">*=</span> (1 <span class="co">-</span> <span class="cv">Friction</span> <span class="co">*</span> dt)',
                    '<span class="cv">Speed</span> = <span class="cp">min</span>(<span class="cv">Speed</span>, <span class="cp">MaxSpeed</span>)',
                    '<span class="ck">Loc</span> <span class="co">+=</span> <span class="ck">Forward</span> <span class="co">*</span> <span class="cv">Speed</span> <span class="co">*</span> dt'
                ]
            };
            aCode.innerHTML = lines[simMode].map(l => `<div>${l}</div>`).join('');
        }

        // ========================
        //  Auto Simulation
        // ========================
        function getTrackPx(trackEl) {
            return trackEl.offsetWidth - 32; // ball width + margins
        }

        function setBallPos(ballEl, trackEl, pos) {
            const tw = getTrackPx(trackEl);
            const pct = (pos % TRACK_MAX) / TRACK_MAX;
            ballEl.style.left = (5 + pct * tw) + 'px';
        }

        function tickAuto() {
            const speed0 = parseFloat(sSpeed.value);
            const accel = parseFloat(sAccel.value);
            const friction = parseFloat(sFriction.value);
            const maxSpd = parseFloat(sMaxSpeed.value);

            if (simMode === 0) {
                // 등속: constant speed while moving
                if (A.moving) {
                    A.speed = speed0;
                } else {
                    A.speed = 0;
                }
            } else if (simMode === 1) {
                // 가속: accelerate while moving
                if (A.moving) {
                    A.speed += accel * DT;
                }
            } else if (simMode === 2) {
                // 가속+마찰
                if (A.moving) {
                    A.speed += accel * DT;
                }
                A.speed *= (1 - friction * DT);
                if (A.speed < 0.1) A.speed = 0;
            } else {
                // 최대속도
                if (A.moving) {
                    A.speed += accel * DT;
                }
                A.speed *= (1 - friction * DT);
                A.speed = Math.min(A.speed, maxSpd);
                if (A.speed < 0.1) A.speed = 0;
            }

            A.pos += A.speed * DT;
            A.time += DT;

            // wrap
            if (A.pos > TRACK_MAX) {
                A.pos = A.pos % TRACK_MAX;
            }

            // graph
            A.pts.push({ speed: A.speed, time: A.time });
            if (A.pts.length > 400) A.pts.shift();

            // render
            setBallPos(aBall, document.getElementById('aTrack'), A.pos);
            aSpeedBadge.textContent = A.speed.toFixed(0);
            drawGraph(aGraph, A.pts, modeColors[simMode]);

            if (A.running) {
                A.raf = requestAnimationFrame(tickAuto);
            }
        }

        function startAutoLoop() {
            if (!A.running) {
                A.running = true;
                tickAuto();
            }
        }

        function stopAutoLoop() {
            A.running = false;
            if (A.raf) cancelAnimationFrame(A.raf);
        }

        function resetAuto() {
            stopAutoLoop();
            A.moving = false;
            A.pos = 0;
            A.speed = 0;
            A.time = 0;
            A.pts = [];
            aMoveBtn.textContent = '이동';
            aMoveBtn.classList.remove('active-move');
            aStopBtn.disabled = true;
            setBallPos(aBall, document.getElementById('aTrack'), 0);
            aSpeedBadge.textContent = '0';
            drawGraph(aGraph, [], modeColors[simMode]);
        }

        aMoveBtn.addEventListener('click', () => {
            A.moving = true;
            aMoveBtn.textContent = '이동 중…';
            aMoveBtn.classList.add('active-move');
            aStopBtn.disabled = false;
            startAutoLoop();
        });

        aStopBtn.addEventListener('click', () => {
            A.moving = false;
            aMoveBtn.textContent = '이동';
            aMoveBtn.classList.remove('active-move');
            aStopBtn.disabled = true;
            // keep loop running so friction/decel can be observed
            if (simMode >= 2) {
                // friction modes: keep running until speed reaches 0
                // loop will keep going
            } else {
                // 등속, 가속(no friction): stop immediately
                if (simMode === 0) A.speed = 0;
                // 가속 without friction: object keeps current speed forever - stop loop
                // Actually for 가속 mode, stopping just means no more accel; speed stays.
                // Let's keep the loop running for 가속 too so user sees it keep moving.
            }
        });

        aResetBtn.addEventListener('click', resetAuto);

        // ========================
        //  Graph Drawing
        // ========================
        function drawGraph(canvas, points, color) {
            const ctx = canvas.getContext('2d');
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);

            const w = rect.width, h = rect.height;
            const pad = 20;

            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, w, h);

            // grid
            ctx.strokeStyle = '#f0f0f0';
            ctx.lineWidth = 0.5;
            for (let i = 1; i < 5; i++) {
                const y = pad + (h - 2 * pad) * (i / 5);
                ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(w - pad, y); ctx.stroke();
            }

            // axes
            ctx.strokeStyle = '#e5e5e5';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(pad, pad); ctx.lineTo(pad, h - pad); ctx.lineTo(w - pad, h - pad);
            ctx.stroke();

            ctx.fillStyle = '#999';
            ctx.font = '12px system-ui';
            ctx.textAlign = 'center';
            ctx.fillText('시간', w / 2, h - 4);
            ctx.save();
            ctx.translate(10, h / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText('속도', 0, 0);
            ctx.restore();

            if (points.length < 2) return;

            const maxSpd = Math.max(...points.map(p => p.speed), 100);

            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            points.forEach((p, i) => {
                const x = pad + (i / (points.length - 1)) * (w - 2 * pad);
                const y = h - pad - (p.speed / maxSpd) * (h - 2 * pad);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
        }

        // ========================
        //  Manual Mode
        // ========================
        const M = {
            frame: 0,
            pos: 0,
            speed: 0,
            time: 0,
            pts: [],
            logs: []
        };

        const mBall = document.getElementById('mBall');
        const mSpeedBadge = document.getElementById('mSpeedBadge');
        const mGraph = document.getElementById('mGraph');
        const mStepCard = document.getElementById('mStepCard');
        const mLogBody = document.getElementById('mLogBody');
        const mLogWrap = document.getElementById('mLogWrap');
        const sAccelM = document.getElementById('sAccelM');
        const sFrictionM = document.getElementById('sFrictionM');

        function stepManual() {
            const accel = parseFloat(sAccelM.value);
            const friction = parseFloat(sFrictionM.value);

            const oldSpd = M.speed;
            let spd = oldSpd;
            spd += accel * DT;
            const spdAfterAccel = spd;
            spd *= (1 - friction * DT);
            if (spd < 0.1) spd = 0;
            const spdAfterFriction = spd;

            M.speed = spd;
            const mov = M.speed * DT;
            M.pos += mov;
            if (M.pos > TRACK_MAX) M.pos = M.pos % TRACK_MAX;

            M.frame++;
            M.time += DT;

            M.pts.push({ speed: M.speed, time: M.time });
            M.logs.push({ frame: M.frame, speed: M.speed, mov, pos: M.pos });

            // Step card
            mStepCard.innerHTML = `
                <div class="frame-num">Frame ${M.frame}</div>
                <div class="calc">
                    <div><span class="cv">Speed</span> = ${oldSpd.toFixed(1)}</div>
                    <div><span class="co">+</span> Accel × dt = <span class="co">+</span>${accel} × 0.016 = <span class="co">+</span>${(accel * DT).toFixed(2)} → ${spdAfterAccel.toFixed(1)}</div>
                    <div><span class="co">×</span> (1 - ${friction.toFixed(1)} × 0.016) = <span class="co">×</span>${(1 - friction * DT).toFixed(3)} → <span class="cv">${spdAfterFriction.toFixed(1)}</span></div>
                    <div>이동량 = ${spdAfterFriction.toFixed(1)} × 0.016 = <span class="cv">${mov.toFixed(2)}</span></div>
                </div>
            `;

            // Update UI
            setBallPos(mBall, document.getElementById('mTrack'), M.pos);
            mSpeedBadge.textContent = M.speed.toFixed(0);
            drawGraph(mGraph, M.pts, '#be185d');

            // Log table
            mLogBody.innerHTML = M.logs.map((l, i) => `
                <tr class="${i === M.logs.length - 1 ? 'current' : ''}">
                    <td>${l.frame}</td>
                    <td>${l.speed.toFixed(1)}</td>
                    <td>${l.mov.toFixed(2)}</td>
                    <td>${l.pos.toFixed(1)}</td>
                </tr>
            `).join('');
            mLogWrap.scrollTop = mLogWrap.scrollHeight;
        }

        function resetManual() {
            M.frame = 0; M.pos = 0; M.speed = 0; M.time = 0;
            M.pts = []; M.logs = [];
            mStepCard.innerHTML = '<div class="placeholder">한 프레임 진행 버튼을 눌러 시작하세요</div>';
            mLogBody.innerHTML = '';
            setBallPos(mBall, document.getElementById('mTrack'), 0);
            mSpeedBadge.textContent = '0';
            drawGraph(mGraph, [], '#be185d');
        }

        document.getElementById('mStepBtn').addEventListener('click', stepManual);
        document.getElementById('mResetBtn').addEventListener('click', resetManual);

        // ========================
        //  Init
        // ========================
        setSimMode(0);
        drawGraph(mGraph, [], '#be185d');
    </script>
</body>
</html>
