<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게임 루프</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #fff;
            color: #333;
            padding: 30px 16px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .header p {
            font-size: 15px;
            color: #999;
        }

        /* === Frame Card === */
        .frame-card-wrapper {
            perspective: 800px;
            margin-bottom: 20px;
        }

        .frame-card {
            background: #fafafa;
            border: 1.5px solid #e5e5e5;
            border-radius: 10px;
            padding: 20px;
            transition: transform 0.4s ease;
            transform-origin: center;
        }

        .frame-card.flipping {
            animation: flipIn 0.4s ease;
        }

        @keyframes flipIn {
            0%   { transform: rotateX(-90deg); opacity: 0; }
            50%  { opacity: 0.5; }
            100% { transform: rotateX(0deg); opacity: 1; }
        }

        .frame-number {
            font-size: 13px;
            font-weight: 600;
            color: #999;
            margin-bottom: 16px;
            text-align: center;
        }

        .frame-number span {
            color: #2563eb;
            font-size: 15px;
        }

        /* === Stages Row === */
        .stages-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            margin-bottom: 16px;
        }

        .stage-box {
            width: 140px;
            padding: 16px 12px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1.5px solid #e5e5e5;
            background: #fff;
        }

        .stage-box.active {
            transform: scale(1.05);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        .stage-box.done {
            opacity: 0.5;
        }

        .stage-box.pending {
            opacity: 0.4;
        }

        .stage-icon {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .stage-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .stage-name-en {
            font-size: 12px;
            color: #999;
        }

        /* Stage colors */
        .stage-input.active {
            background: #eff6ff;
            border-color: #2563eb;
        }
        .stage-input.active .stage-name { color: #2563eb; }

        .stage-logic.active {
            background: #fffbeb;
            border-color: #f59e0b;
        }
        .stage-logic.active .stage-name { color: #b45309; }

        .stage-render.active {
            background: #fff1f2;
            border-color: #be185d;
        }
        .stage-render.active .stage-name { color: #be185d; }

        /* Arrow between stages */
        .stage-arrow {
            font-size: 18px;
            color: #d1d5db;
            margin: 0 6px;
            flex-shrink: 0;
            transition: color 0.3s;
        }

        .stage-arrow.lit {
            color: #666;
        }

        /* Current stage description */
        .stage-desc-bar {
            text-align: center;
            font-size: 14px;
            color: #666;
            padding: 10px 16px;
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e5e5e5;
            min-height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stage-desc-bar .tick-badge {
            display: inline-block;
            background: #fef3c7;
            color: #b45309;
            font-size: 12px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 8px;
        }

        /* === Controls === */
        .controls {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .ctrl-btn {
            padding: 10px 18px;
            border: 1.5px solid #e5e5e5;
            background: #fafafa;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: #333;
            transition: all 0.2s;
        }

        .ctrl-btn:hover {
            border-color: #2563eb;
            color: #2563eb;
            background: #fff;
        }

        .ctrl-btn.primary {
            background: #2563eb;
            border-color: #2563eb;
            color: #fff;
        }

        .ctrl-btn.primary:hover {
            background: #1d4ed8;
        }

        .ctrl-btn.auto-active {
            background: #dc2626;
            border-color: #dc2626;
            color: #fff;
        }

        .ctrl-btn.auto-active:hover {
            background: #b91c1c;
        }

        .speed-btn {
            padding: 8px 12px;
            font-size: 12px;
            min-width: 40px;
        }

        .speed-btn.active {
            background: #333;
            border-color: #333;
            color: #fff;
        }

        /* === Frame History === */
        .history-section {
            margin-bottom: 20px;
        }

        .history-label {
            font-size: 12px;
            font-weight: 600;
            color: #999;
            text-align: center;
            margin-bottom: 8px;
        }

        .history-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .history-dot {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            border: 2px solid #e5e5e5;
            background: #fff;
            color: #ccc;
            transition: all 0.3s;
        }

        .history-dot.completed {
            background: #f0fdf4;
            border-color: #86efac;
            color: #16a34a;
        }

        .history-dot.current {
            background: #eff6ff;
            border-color: #2563eb;
            color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
        }

        /* === Timeline + Character === */
        .scene-section {
            margin-bottom: 20px;
        }

        .scene-label {
            font-size: 12px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .scene-track {
            position: relative;
            height: 48px;
            background: #f9fafb;
            border: 1.5px solid #e5e5e5;
            border-radius: 8px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .scene-ground {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: #e5e5e5;
        }

        .scene-char {
            position: absolute;
            bottom: 6px;
            left: 12px;
            /* no transition — jumps on render stage only */
        }

        .timeline-wrap {
            background: #fafafa;
            border: 1.5px solid #e5e5e5;
            border-radius: 10px;
            padding: 14px 16px;
        }

        .timeline-label {
            font-size: 12px;
            font-weight: 600;
            color: #999;
            margin-bottom: 8px;
        }

        .timeline-canvas-wrap {
            position: relative;
        }

        .timeline-canvas-wrap canvas {
            display: block;
            width: 100%;
            height: 80px;
            border-radius: 6px;
        }

        /* === Footer === */
        .footer {
            text-align: center;
            font-size: 14px;
            color: #666;
            padding: 12px;
            background: #fffbeb;
            border: 1.5px solid #f59e0b;
            border-radius: 8px;
        }

        .footer strong { color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>게임 루프</h1>
            <p>한 프레임 = 입력 → 로직 → 렌더, 이것의 반복</p>
        </div>

        <!-- Frame Card -->
        <div class="frame-card-wrapper">
            <div class="frame-card" id="frameCard">
                <div class="frame-number">Frame <span id="frameNum">1</span></div>

                <div class="stages-row">
                    <div class="stage-box stage-input active" data-stage="0">
                        <div class="stage-icon">🎮</div>
                        <div class="stage-name">입력</div>
                        <div class="stage-name-en">Input</div>
                    </div>
                    <div class="stage-arrow" id="arrow0">→</div>
                    <div class="stage-box stage-logic pending" data-stage="1">
                        <div class="stage-icon">⚙️</div>
                        <div class="stage-name">로직</div>
                        <div class="stage-name-en">Tick</div>
                    </div>
                    <div class="stage-arrow" id="arrow1">→</div>
                    <div class="stage-box stage-render pending" data-stage="2">
                        <div class="stage-icon">🖥️</div>
                        <div class="stage-name">렌더</div>
                        <div class="stage-name-en">Draw</div>
                    </div>
                </div>

                <div class="stage-desc-bar" id="stageDesc">
                    키보드, 마우스, 게임패드 입력을 수집합니다
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="ctrl-btn" id="prevBtn">◀ 이전</button>
            <button class="ctrl-btn primary" id="nextBtn">다음 ▶</button>
            <button class="ctrl-btn" id="autoBtn">⏯ 자동 재생</button>
            <button class="ctrl-btn speed-btn active" data-speed="600" id="speed1">×1</button>
            <button class="ctrl-btn speed-btn" data-speed="250" id="speed2">×3</button>
            <button class="ctrl-btn speed-btn" data-speed="100" id="speed3">×10</button>
        </div>

        <!-- Frame History -->
        <div class="history-section">
            <div class="history-label">프레임 히스토리</div>
            <div class="history-dots" id="historyDots"></div>
        </div>

        <!-- Scene: Character Movement -->
        <div class="scene-section">
            <div class="scene-label">캐릭터 위치</div>
            <div class="scene-track" id="sceneTrack">
                <div class="scene-ground"></div>
                <svg class="scene-char" id="sceneChar" width="28" height="34" viewBox="0 0 28 34">
                    <rect x="4" y="0" width="20" height="24" rx="4" fill="#2563eb"/>
                    <rect x="6" y="24" width="6" height="8" rx="2" fill="#1e40af"/>
                    <rect x="16" y="24" width="6" height="8" rx="2" fill="#1e40af"/>
                    <circle cx="11" cy="10" r="2.5" fill="#fff"/>
                    <circle cx="19" cy="10" r="2.5" fill="#fff"/>
                </svg>
            </div>
        </div>

        <!-- Frame Timeline Graph -->
        <div class="scene-section">
            <div class="timeline-wrap">
                <div class="timeline-label">프레임 타임라인 — 프레임이 쌓일수록 캐릭터가 이동합니다</div>
                <div class="timeline-canvas-wrap">
                    <canvas id="timelineCanvas" width="668" height="80"></canvas>
                </div>
            </div>
        </div>

        <div class="footer">
            <strong>이 3단계가 1초에 수십 번 반복되면, 그것이 게임입니다</strong>
        </div>
    </div>

    <script>
        // === State ===
        const MAX_FRAMES = 8;
        let frame = 1;       // 1-based
        let stage = 0;       // 0=입력, 1=로직, 2=렌더
        let autoPlaying = false;
        let autoTimerId = null;

        // Total step = (frame-1)*3 + stage, range 0..(MAX_FRAMES*3-1)
        function totalStep() { return (frame - 1) * 3 + stage; }
        function maxStep() { return MAX_FRAMES * 3 - 1; }

        function setFromTotal(s) {
            s = Math.max(0, Math.min(maxStep(), s));
            frame = Math.floor(s / 3) + 1;
            stage = s % 3;
        }

        const stageDescs = [
            '키보드, 마우스, 게임패드 입력을 수집합니다',
            '캐릭터 이동, AI, 물리 계산을 수행합니다',
            '계산 결과를 화면에 그립니다'
        ];

        // === DOM ===
        const frameCard = document.getElementById('frameCard');
        const frameNum = document.getElementById('frameNum');
        const stageDesc = document.getElementById('stageDesc');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        const autoBtn = document.getElementById('autoBtn');
        const stageBoxes = document.querySelectorAll('.stage-box');
        const arrows = [document.getElementById('arrow0'), document.getElementById('arrow1')];
        const historyDots = document.getElementById('historyDots');

        // === Build History Dots ===
        for (let i = 1; i <= MAX_FRAMES; i++) {
            const dot = document.createElement('div');
            dot.className = 'history-dot';
            dot.textContent = i;
            historyDots.appendChild(dot);
        }

        // === Render ===
        let prevFrame = 1;

        function render() {
            // Frame number
            frameNum.textContent = frame;

            // Flip animation on frame change
            if (frame !== prevFrame) {
                frameCard.classList.remove('flipping');
                void frameCard.offsetWidth; // reflow
                frameCard.classList.add('flipping');
                prevFrame = frame;
            }

            // Stage boxes
            stageBoxes.forEach((box, i) => {
                box.classList.remove('active', 'done', 'pending');
                if (i === stage) box.classList.add('active');
                else if (i < stage) box.classList.add('done');
                else box.classList.add('pending');
            });

            // Arrows
            arrows.forEach((a, i) => {
                a.classList.toggle('lit', i < stage);
            });

            // Description
            if (stage === 1) {
                stageDesc.innerHTML = stageDescs[1] + '<span class="tick-badge">1회차의 Tick!</span>';
            } else {
                stageDesc.textContent = stageDescs[stage];
            }

            // History dots
            const dots = historyDots.children;
            for (let i = 0; i < MAX_FRAMES; i++) {
                const d = dots[i];
                d.classList.remove('completed', 'current');
                if (i + 1 < frame) d.classList.add('completed');
                else if (i + 1 === frame) d.classList.add('current');
            }

            // Button states
            prevBtn.disabled = totalStep() === 0;
            nextBtn.disabled = totalStep() === maxStep() && !autoPlaying;
        }

        // === Navigation ===
        function goNext() {
            let s = totalStep();
            if (s >= maxStep()) {
                if (autoPlaying) {
                    // Loop back to frame 1
                    setFromTotal(0);
                } else {
                    return;
                }
            } else {
                setFromTotal(s + 1);
            }
            render();
        }

        function goPrev() {
            let s = totalStep();
            if (s <= 0) return;
            setFromTotal(s - 1);
            render();
        }

        nextBtn.addEventListener('click', () => {
            stopAuto();
            goNext();
        });

        prevBtn.addEventListener('click', () => {
            stopAuto();
            goPrev();
        });

        // === Speed Control ===
        let autoSpeed = 600; // ms per step

        document.querySelectorAll('.speed-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                autoSpeed = parseInt(btn.dataset.speed);
                // If currently playing, restart interval with new speed
                if (autoPlaying) {
                    clearInterval(autoTimerId);
                    autoTimerId = setInterval(goNext, autoSpeed);
                }
            });
        });

        // === Auto Play ===
        function startAuto() {
            autoPlaying = true;
            autoBtn.textContent = '⏸ 정지';
            autoBtn.classList.add('auto-active');
            autoTimerId = setInterval(goNext, autoSpeed);
        }

        function stopAuto() {
            autoPlaying = false;
            autoBtn.textContent = '⏯ 자동 재생';
            autoBtn.classList.remove('auto-active');
            if (autoTimerId) {
                clearInterval(autoTimerId);
                autoTimerId = null;
            }
        }

        autoBtn.addEventListener('click', () => {
            if (autoPlaying) {
                stopAuto();
            } else {
                if (totalStep() >= maxStep()) {
                    setFromTotal(0);
                    render();
                }
                startAuto();
            }
        });

        // === Timeline Canvas + Character ===
        const timelineCanvas = document.getElementById('timelineCanvas');
        const tlCtx = timelineCanvas.getContext('2d');
        const sceneChar = document.getElementById('sceneChar');
        const sceneTrack = document.getElementById('sceneTrack');

        const stageColors = ['#2563eb', '#f59e0b', '#be185d'];
        const stageLabels = ['I', 'T', 'D'];

        function drawTimeline() {
            const dpr = window.devicePixelRatio || 1;
            const cw = timelineCanvas.offsetWidth;
            const ch = timelineCanvas.offsetHeight;
            timelineCanvas.width = cw * dpr;
            timelineCanvas.height = ch * dpr;
            tlCtx.scale(dpr, dpr);

            // Clear
            tlCtx.fillStyle = '#fff';
            tlCtx.fillRect(0, 0, cw, ch);

            const pad = 4;
            const totalSlots = MAX_FRAMES * 3;
            const slotW = (cw - pad * 2) / totalSlots;
            const barH = ch - 30; // leave room for labels
            const barY = 6;

            // Draw completed + current steps
            const curStep = totalStep();
            for (let i = 0; i <= curStep && i < totalSlots; i++) {
                const f = Math.floor(i / 3);  // frame index 0-based
                const s = i % 3;               // stage index
                const x = pad + i * slotW;
                const isCurrent = (i === curStep);

                // Bar
                tlCtx.fillStyle = stageColors[s];
                tlCtx.globalAlpha = isCurrent ? 1.0 : 0.6;
                tlCtx.fillRect(x + 1, barY, slotW - 2, barH);
                tlCtx.globalAlpha = 1;

                // Stage letter inside bar
                if (slotW > 12) {
                    tlCtx.fillStyle = '#fff';
                    tlCtx.font = `bold ${Math.min(11, slotW - 4)}px system-ui`;
                    tlCtx.textAlign = 'center';
                    tlCtx.fillText(stageLabels[s], x + slotW / 2, barY + barH / 2 + 4);
                }
            }

            // Frame number labels below
            for (let f = 0; f < MAX_FRAMES; f++) {
                const startSlot = f * 3;
                const x = pad + startSlot * slotW;
                const groupW = slotW * 3;

                // Frame bracket line
                const ly = barY + barH + 4;
                if (f < frame) {
                    tlCtx.strokeStyle = '#ccc';
                    tlCtx.lineWidth = 1;
                    tlCtx.beginPath();
                    tlCtx.moveTo(x + 2, ly);
                    tlCtx.lineTo(x + 2, ly + 4);
                    tlCtx.lineTo(x + groupW - 2, ly + 4);
                    tlCtx.lineTo(x + groupW - 2, ly);
                    tlCtx.stroke();
                }

                // Frame number
                tlCtx.fillStyle = f + 1 === frame ? '#2563eb' : (f + 1 < frame ? '#999' : '#ddd');
                tlCtx.font = `${f + 1 === frame ? 'bold ' : ''}12px system-ui`;
                tlCtx.textAlign = 'center';
                tlCtx.fillText(`F${f + 1}`, x + groupW / 2, ly + 16);
            }

            // Empty slots (future)
            for (let i = curStep + 1; i < totalSlots; i++) {
                const x = pad + i * slotW;
                tlCtx.fillStyle = '#f3f4f6';
                tlCtx.fillRect(x + 1, barY, slotW - 2, barH);
            }

            // Current position marker
            if (curStep >= 0) {
                const mx = pad + curStep * slotW + slotW / 2;
                tlCtx.fillStyle = '#333';
                tlCtx.beginPath();
                tlCtx.moveTo(mx, barY - 1);
                tlCtx.lineTo(mx - 4, barY - 6);
                tlCtx.lineTo(mx + 4, barY - 6);
                tlCtx.closePath();
                tlCtx.fill();
            }
        }

        function updateCharacter() {
            // Character only moves when render stage completes
            // Count fully rendered frames: frames before current + current if past render
            const renderedFrames = (frame - 1) + (stage >= 2 ? 1 : 0);
            const trackW = sceneTrack.offsetWidth - 40;
            const pct = renderedFrames / MAX_FRAMES;
            sceneChar.style.left = (12 + pct * trackW) + 'px';
        }

        // Patch render to also update timeline + character
        const _origRender = render;
        render = function() {
            _origRender();
            drawTimeline();
            updateCharacter();
        };

        // === Init ===
        render();
        window.addEventListener('resize', () => { drawTimeline(); updateCharacter(); });
    </script>
</body>
</html>
